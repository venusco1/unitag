<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Primary SEO -->

  <meta name="description" content="Unitag Uniforms provides premium corporate, industrial, hospitality, and customized uniforms. High-quality stitching, bulk orders, and professional uniform solutions." />

  <meta property="og:type" content="website" />

  <link rel="icon" type="image/png" href="https://www.unitaguniforms.com/assets/unitag-logo.jpeg" />
  <link rel="apple-touch-icon" href="https://www.unitaguniforms.com/assets/unitag-logo.jpeg" />

  <!-- Performance -->

  <!-- Bootstrap -->

  <!-- Link tree / bio page -->
  <link rel="stylesheet" href="tree.css" />

  <!-- Local Business Schema for Google -->

    "@context": "https://schema.org",

    "description": "Unitag Uniforms provides premium corporate, hospitality and industrial uniforms with custom stitching services.",
    "telephone": "+966506444915",
    "address": [
      {
        "@type": "PostalAddress",
        "addressCountry": "India"
      },
      {
        "@type": "PostalAddress",
        "addressCountry": "India"
      }
    ],
    "sameAs": [
      "https://www.facebook.com/share/1Bv55Vv7Ut/",
      "https://www.instagram.com/unitag_uniforms?igsh=NjVsd3l0cmpoYnp2&utm_source=qr"
    ]
  }
  </script>

</head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
    </div>
    <main class="wrap">
<section class="card" aria-label="Unitags Uniforms - Premium Uniforms & Custom Stitching">
  <header class="top">

    <div class="profileHeader">

      <div class="logo" aria-label="Unitags logo">
        <img src="assets/unitag-logo-nobg.png"
             alt="Unitags Uniforms logo"
             loading="eager"
             decoding="async"
             onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='grid';"
        />

        <div id="logoFallback" class="logoFallback" aria-hidden="true"></div>
      </div>

      <h1 id="profileName" class="visuallyHidden">UNITAG UNIFORMS</h1>
      <img id="profileTitleImage" src="assets/unitag-uniforms-title.png" alt="UNITAG UNIFORMS" class="profileTitleImage" loading="eager" decoding="async" />

      <p id="profileTagline" class="tagline">
        Official links • Socials • Contact • Locations
      </p>

      <!-- <p id="profileBio" class="bio">
        Premium, tailor-made uniforms for hospitality, corporate, and industrial teams — designed for comfort, durability, and a polished brand presence.
      </p> -->

      <div id="socialRow" class="socialRow" aria-label="Social icons"></div>

    </div>

  </header>

  <div id="links" class="links" aria-live="polite"></div>

  <footer class="footer" aria-label="Footer">
    <small>
      &copy; <span id="year"></span> 
      <a href="https://www.unitaguniforms.com/">Unitag Uniforms</a> | 
      Designed by
      <a href="https://www.venusco.in" target="_blank" rel="noopener noreferrer">Venusco</a>
    </small>  
</footer>
</section>
    </main> 

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>

      // ============================================================
      // FULL FEATURED LINK PAGE TEMPLATE (Edit PROFILE + LINKS) // 
      // ============================================================

      const PROFILE = {
        name: "UNITAG UNIFORMS",
        tagline: "Uniforms • Custom Stitching • Bulk Orders",
        bio: "",
        website: "https://www.unitaguniforms.com/",
      };

      // Dummy links (replace with your real links)
      const LINKS = {
        website: "https://www.unitaguniforms.com/",
        instagram: "https://www.instagram.com/unitag_uniforms?igsh=NjVsd3l0cmpoYnp2&utm_source=qr",
        facebook: "https://www.facebook.com/share/1Bv55Vv7Ut/",
        // linkedin: "https://linkedin.com/company/unitag-uniforms",
        phones: ["+966506444915", "+966559512393", "+966546787553"],
        whatsapp: "+966506444915",
        email: "unitaguniforms@gmail.com",
        locations: ["https://maps.app.goo.gl/bXcT9GAc4eRAmrYR8?g_st=aw", "https://maps.app.goo.gl/ExbkAf93jj8Kh5qW7"],
        googleReview: "https://g.page/r/CYr_opCsY3BaEAE/review",
        // When this page is hosted at `/tree`, relative paths like `assets/...` break.
        catalogUrl: "https://www.unitaguniforms.com/assets/catalog.pdf",
      };

      const $ = (sel) => document.querySelector(sel);
      const toastEl = $("#toast");
      const ASSET_ICON_PATH = "assets/icons";

      const icons = {
        catalog: `<img class="icon iconImg" src="${ASSET_ICON_PATH}/catalog.png" alt="" aria-hidden="true" loading="lazy" />`,
        map: `<img class="icon iconImg" src="${ASSET_ICON_PATH}/map.png" alt="" aria-hidden="true" loading="lazy" />`,
        whatsapp: `<img class="icon iconImg" src="${ASSET_ICON_PATH}/wp.png" alt="" aria-hidden="true" loading="lazy" />`,
        website: `<img class="icon iconImg" src="${ASSET_ICON_PATH}/web.png" alt="" aria-hidden="true" loading="lazy" />`,
        instagram: `<img class="icon iconImg" src="${ASSET_ICON_PATH}/ig.png" alt="" aria-hidden="true" loading="lazy" />`,
        facebook: `<img class="icon iconImg" src="${ASSET_ICON_PATH}/fb.png" alt="" aria-hidden="true" loading="lazy" />`,
        google: `<img class="icon iconImg" src="${ASSET_ICON_PATH}/google.png" alt="" aria-hidden="true" loading="lazy" />`,
        linkedin: `<svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6.7 9.2H3.6V21h3.1V9.2ZM5.15 3.2A1.8 1.8 0 1 0 5.2 6.8a1.8 1.8 0 0 0-.05-3.6ZM20.6 21h-3.1v-6.1c0-1.5-.03-3.4-2.1-3.4-2.1 0-2.4 1.6-2.4 3.3V21H10V9.2h3v1.6h.05c.42-.8 1.45-1.6 3-1.6 3.2 0 3.8 2.1 3.8 4.9V21Z" fill="currentColor" opacity=".92"/></svg>`,
        phone: `<img class="icon iconImg" src="${ASSET_ICON_PATH}/call.png" alt="" aria-hidden="true" loading="lazy" />`,
        email: `<img class="icon iconImg" src="${ASSET_ICON_PATH}/mail.png" alt="" aria-hidden="true" loading="lazy" />`,
        chev: `<svg class="chev" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      };

      function sanitizeDigits(value) {
        return String(value || "").replace(/[^\d]/g, "");
      }

      function isFilled(value) {
        const v = String(value || "").trim();
        return Boolean(v);
      }

      let toastTimer = null;
      function toast(message) {
        if (!toastEl) return;
        if (toastTimer) window.clearTimeout(toastTimer);
        toastEl.textContent = message;
        toastEl.classList.add("show");
        toastTimer = window.setTimeout(() => {
          toastEl.classList.remove("show");
        }, 2200);
      }

      async function copyText(text, label = "Copied") {
        const value = String(text || "").trim();
        if (!value) return toast("Nothing to copy yet.");
        try {
          await navigator.clipboard.writeText(value);
          toast(`${label}: ${value}`);
        } catch {
          const ta = document.createElement("textarea");
          ta.value = value;
          ta.setAttribute("readonly", "true");
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          ta.remove();
          toast(`${label}: ${value}`);
        }
      }

      async function sharePage() {
        const url = window.location.href;
        const data = {
          title: PROFILE.name,
          text: `${PROFILE.name} — official links`,
          url,
        };

        try {
          if (navigator.share) {
            await navigator.share(data);
            toast("Share sheet opened.");
          } else {
            await copyText(url, "Link copied");
          }
        } catch {
          // user cancelled — no toast needed
        }
      }

      function downloadVCard() {
        const tel = LINKS.phones && LINKS.phones.length > 0 ? String(LINKS.phones[0]).trim() : "";
        const email = String(LINKS.email || "").trim();
        const url = String(PROFILE.website || "").trim();

        const lines = [
          "BEGIN:VCARD",
          "VERSION:3.0",
          `FN:${PROFILE.name}`,
          tel ? `TEL;TYPE=WORK,VOICE:${tel}` : "",
          email ? `EMAIL;TYPE=WORK:${email}` : "",
          url ? `URL:${url}` : "",
          "END:VCARD",
        ].filter(Boolean);

        const blob = new Blob([lines.join("\n")], { type: "text/vcard;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${PROFILE.name.replace(/\s+/g, "-").toLowerCase()}-contact.vcf`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        toast("Contact card downloaded.");
      }

      function makeButton({ href, title, subtitle, leftIcon, ariaLabel }) {
        const a = document.createElement("a");
        a.className = "btn";
        a.href = href;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.setAttribute("aria-label", ariaLabel || title);
        a.innerHTML = `
          ${leftIcon}
          <div class="btnTitle">
            <strong>${title}</strong>
            <span>${subtitle}</span>
          </div>
          ${icons.chev}
        `;
        return a;
      }

      function buildPrimaryLinkItems() {
        return [
          {
            key: "catalog",
            title: "Download Catalog",
            subtitle: "PDF brochure",
            href: LINKS.catalogUrl,
            icon: icons.catalog,
            search: [LINKS.catalogUrl, "pdf", "brochure", "download"],
          },
          ...buildLocationGroup(),
          {
            key: "googleReview",
            title: "Google Review",
            subtitle: "Leave a review",
            href: LINKS.googleReview,
            icon: icons.google,
            search: [LINKS.googleReview, "review", "google"],
          },
          {
            key: "whatsapp",
            title: "WhatsApp",
            subtitle: String(LINKS.whatsapp || ""),
            href: LINKS.whatsapp ? `https://wa.me/${sanitizeDigits(LINKS.whatsapp)}?text=${encodeURIComponent("Hi Unitag Uniforms! I'd like to inquire about uniforms.")}` : "",
            icon: icons.whatsapp,
            search: [LINKS.whatsapp, "wa", "chat"],
          },
          ...buildContactGroup(),
          {
            key: "website",
            title: "Visit Website",
            subtitle: "Shop & explore",
            href: LINKS.website,
            icon: icons.website,
            search: [LINKS.website, "web", "shop"],
          },
          {
            key: "instagram",
            title: "Instagram",
            subtitle: "Follow & message us",
            href: LINKS.instagram,
            icon: icons.instagram,
            search: [LINKS.instagram, "insta", "ig"],
          },
          {
            key: "facebook",
            title: "Facebook",
            subtitle: "Updates & posts",
            href: LINKS.facebook,
            icon: icons.facebook,
            search: [LINKS.facebook, "fb"],
          },
          {
            key: "email",
            title: "Email",
            subtitle: String(LINKS.email || ""),
            href: LINKS.email ? `mailto:${String(LINKS.email).trim()}` : "",
            icon: icons.email,
            search: [LINKS.email, "mail"],
          },

        ].filter((x) => (x.type === "group" ? true : isFilled(x.href)));
      }

      function buildPhoneOptions() {
        return (LINKS.phones || [])
          .filter((phone) => isFilled(phone))
          .map((phone, index) => ({
            key: `phone-option-${index + 1}`,
            title: `Phone ${index + 1}`,
            subtitle: phone,
            href: `tel:${String(phone).trim()}`,
            icon: icons.phone,
          }));
      }

      function buildLocationOptions() {
        return (LINKS.locations || [])
          .filter((location) => isFilled(location))
          .map((location, index) => ({
            key: `location-option-${index + 1}`,
            title: `Location ${index + 1}`,
            subtitle: "Open in Maps",
            href: location,
            icon: icons.map,
          }));
      }

      function buildContactGroup() {
        const phones = buildPhoneOptions();
        if (phones.length === 0) return [];
        if (phones.length === 1) return phones;

        return [{
          key: "contact",
          type: "group",
          title: "Contact",
          subtitle: "Choose a number",
          icon: icons.phone,
          options: phones,
          search: [phones.map((item) => item.subtitle).join(" "), "contact", "phone", "call"],
        }];
      }

      function buildLocationGroup() {
        const locations = buildLocationOptions();
        if (locations.length === 0) return [];
        if (locations.length === 1) return locations;

        return [{
          key: "locations",
          type: "group",
          title: "Locations",
          subtitle: "Choose a location",
          icon: icons.map,
          options: locations,
          search: [locations.map((item) => item.subtitle).join(" "), "location", "map", "address"],
        }];
      }

      function buildLinkItems() {
        return buildPrimaryLinkItems();
      }

      function makeExpandableGroup({title, subtitle, options, icon}) {
        const group = document.createElement("div");
        group.className = "groupCard";

        const toggle = document.createElement("button");
        toggle.className = "btn groupToggle";
        toggle.type = "button";
        toggle.innerHTML = `
          ${icon}
          <div class="btnTitle">
            <strong>${title}</strong>
            <span>${subtitle}</span>
          </div>
          ${icons.chev}
        `;

        const list = document.createElement("div");
        list.className = "groupOptions";
        list.hidden = true;

        options.forEach((opt) => {
          const link = makeButton({
            href: opt.href,
            title: opt.title,
            subtitle: opt.subtitle,
            leftIcon: opt.icon,
            ariaLabel: `Open ${opt.title}`,
          });
          list.appendChild(link);
        });

        toggle.addEventListener("click", () => {
          list.hidden = !list.hidden;
          toggle.setAttribute("aria-expanded", String(!list.hidden));
        });

        group.appendChild(toggle);
        group.appendChild(list);

        return group;
      }

      function renderSocialRow(items) {
        const row = $("#socialRow");
        if (!row) return;
        row.innerHTML = "";

        const socialItems = [
          ...(items.filter((x) => ["instagram", "facebook", "linkedin"].includes(x.key))),
          ...(isFilled(LINKS.whatsapp)
            ? [{
                key: "whatsapp",
                title: "WhatsApp",
                href: `https://wa.me/${sanitizeDigits(LINKS.whatsapp)}?text=${encodeURIComponent("Hi Unitag Uniforms! I’d like to inquire about uniforms.")}`,
                icon: icons.whatsapp,
              }]
            : []),
          ...(isFilled(LINKS.phones && LINKS.phones[0])
            ? [{
                key: "phone",
                title: "Phone",
                href: `tel:${String(LINKS.phones[0]).trim()}`,
                icon: icons.phone,
              }]
            : []),
          ...(isFilled(LINKS.locations && LINKS.locations[0])
            ? [{
                key: "location",
                title: "Location",
                href: LINKS.locations[0],
                icon: icons.map,
              }]
            : []),
        ];

        for (const it of socialItems) {
          const a = document.createElement("a");
          a.className = "iconChip";
          a.href = it.href;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.setAttribute("aria-label", `Open ${it.title}`);
          a.setAttribute("data-social", it.key);
          a.innerHTML = it.icon;
          row.appendChild(a);
        }
      }

      function applyProfile() {
        $("#profileName").textContent = PROFILE.name;
        $("#profileTagline").textContent = PROFILE.tagline;
        const profileBio = $("#profileBio");
        if (profileBio) profileBio.textContent = PROFILE.bio;
      }

      function render() {
        $("#year").textContent = new Date().getFullYear();
        applyProfile();

        const allItems = buildLinkItems();
        renderSocialRow(allItems);

        const container = $("#links");
        container.innerHTML = "";

        const q = String($("#searchInput")?.value || "").trim().toLowerCase();
        const items = allItems.filter((it) => {
          if (!q) return true;
          const hay = [it.title, it.subtitle, ...(it.search || [])]
            .filter(Boolean)
            .join(" ")
            .toLowerCase();
          return hay.includes(q);
        });

        for (const it of items) {
          if (it.type === "group") {
            container.appendChild(makeExpandableGroup(it));
            continue;
          }

          container.appendChild(
            makeButton({
              href: it.href,
              title: it.title,
              subtitle: it.subtitle,
              leftIcon: it.icon,
              ariaLabel: `Open ${it.title}`,
            })
          );
        }

        const status = $("#statusText");
        const shown = items.length;
        const total = allItems.length;
        if (status) {
          status.textContent =
            total === 0
              ? "Add your links in the LINKS section."
              : q
                ? `Showing ${shown} of ${total}`
                : `${total} link${total === 1 ? "" : "s"} available`;
        }

        if (total === 0) {
          container.innerHTML = "";
          const empty = document.createElement("div");
          empty.style.padding = "10px 2px 2px";
          empty.innerHTML = `<div style="color: rgba(255,255,255,.72); font-size: 13px; line-height: 1.55;">
            No links are configured yet. Edit the <strong>LINKS</strong> object in this file and paste your real URLs / numbers.
          </div>`;
          container.appendChild(empty);
        } else if (shown === 0) {
          container.innerHTML = "";
          const empty = document.createElement("div");
          empty.style.padding = "10px 2px 2px";
          empty.innerHTML = `<div style="color: rgba(255,255,255,.72); font-size: 13px; line-height: 1.55;">
            No matches for <strong>${q.replace(/</g, "&lt;")}</strong>. Try “maps”, “phone”, or “instagram”.
          </div>`;
          container.appendChild(empty);
        }
      }

      function wireUI() {
        $("#vcardBtn")?.addEventListener("click", downloadVCard);
      }

      wireUI();
      render();
    </script>
  </body>
</html>
